version: '0.2'
notes:
  - >-
    Gerado automaticamente a partir das planilhas 'Análise Concorrentes - Educacional.xlsx' (aba 'Competitors and key
    words').
  - >-
    Sugestão: preencher URLs oficiais de redes sociais (linkedin/x/instagram/youtube) quando disponíveis para aumentar a
    confiança.
  - 'MVP: coletores social/news/youtube usam queries (search-based) quando não há URL oficial.'
defaults:
  website_paths_hint:
    - /
    - /pricing
    - /plans
    - /product
    - /products
    - /solutions
    - /platform
    - /blog
    - /news
    - /updates
    - /release-notes
    - /changelog
    - /partners
    - /integrations
    - /case-studies
    - /resources
    - /webinars
    - /events
    - /careers
  social_search_templates:
    linkedin: site:linkedin.com {name} (launch OR update OR feature OR parceria OR partnership OR pricing OR preço)
    x: site:x.com {name} (launch OR update OR feature OR partnership OR pricing)
    instagram: site:instagram.com {name} (lançamento OR novidade OR atualização OR parceria)
  youtube_search_template: '{name} (product update OR new feature OR lançamento OR webinar OR demo)'
  news_search_template: '{name} (education OR edtech OR school OR platform OR partnership OR pricing OR launch OR update)'
